# 前端 GHCR 映像建置
name: Frontend GHCR Build

on:
  workflow_call:
    outputs:
      image-tag:
        description: "Image tag (sha-xxx)"
        value: ${{ jobs.build.outputs.image-tag }}

env:
  IMAGE_NAME: ghcr.io/rayliu1999/lazybacktest-frontend

jobs:
  build:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          echo "sha-tag=$SHA_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha-tag }}
