apiVersion: v1
kind: ConfigMap
metadata:
  name: lazybacktest-config
data:
  # 後端的環境變數設定
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  # 資料庫主機 (如果是叢集內部署，可填寫 service name)
  # DB_HOST: "postgres-service"
---
apiVersion: v1
kind: Secret
metadata:
  name: lazybacktest-secret
type: Opaque
stringData:
  # 請在此填寫您的資料庫連線字串
  # 如果要連線本機(Orbstack/Docker Desktop)的資料庫，請使用:
  # DATABASE_URL: "postgresql://postgres:123qwe@host.docker.internal:5432/lazybacktest"
  #
  # 如果使用叢集內的 postgres.yaml，請使用:
  DATABASE_URL: "postgresql://postgres:PASSWORD@postgres-service:5432/lazybacktest"
