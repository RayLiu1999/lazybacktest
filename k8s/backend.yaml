apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazybacktest-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazybacktest-backend
  template:
    metadata:
      labels:
        app: lazybacktest-backend
    spec:
      containers:
        - name: backend
          image: lazybacktest-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: BACKEND_HOST
              valueFrom:
                secretKeyRef:
                  name: lazybacktest-secret
                  key: BACKEND_HOST
            - name: BACKEND_PORT
              valueFrom:
                secretKeyRef:
                  name: lazybacktest-secret
                  key: BACKEND_PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lazybacktest-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: lazybacktest-secret
                  key: REDIS_URL
            - name: LINE_CHANNEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lazybacktest-secret
                  key: LINE_CHANNEL_ACCESS_TOKEN
            - name: LINE_USER_ID
              valueFrom:
                secretKeyRef:
                  name: lazybacktest-secret
                  key: LINE_USER_ID
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lazybacktest-backend
spec:
  selector:
    app: lazybacktest-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
