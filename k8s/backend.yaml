apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazybacktest-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazybacktest-backend
  template:
    metadata:
      labels:
        app: lazybacktest-backend
    spec:
      containers:
        - name: backend
          image: your-registry/lazybacktest-backend:latest # 使用者需替換為實際 image
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lazybacktest-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "" # 如有需要可透過 ConfigMap 設定
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lazybacktest-backend
spec:
  selector:
    app: lazybacktest-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
