apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazybacktest-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazybacktest-frontend
  template:
    metadata:
      labels:
        app: lazybacktest-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/lazybacktest-frontend:latest # 使用者需替換為實際 image
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: lazybacktest-frontend
spec:
  selector:
    app: lazybacktest-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
