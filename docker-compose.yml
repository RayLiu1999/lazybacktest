services:
  # FastAPI 後端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lazybacktest-backend
    environment:
      DATABASE_URL: postgresql://postgres:123qwe@host.docker.internal:5432/lazybacktest
      REDIS_URL: ""
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React 前端 (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lazybacktest-frontend
    ports:
      - "3123:80"
    depends_on:
      - backend
