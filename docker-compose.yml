services:
  # FastAPI 後端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lazybacktest-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-"postgresql://postgres:123qwe@db:5432/lazybacktest"}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-""}
      LINE_USER_ID: ${LINE_USER_ID:-""}
      # 使用nginx同network連container，所以不需要填此項
      BACKEND_CORS_ORIGINS: ""
      REDIS_URL: ""
    ports:
      - "${HOST_IP:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React 前端 (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lazybacktest-frontend
    ports:
      - "${HOST_IP:-127.0.0.1}:${FRONTEND_PORT:-3123}:80"
    depends_on:
      - backend
